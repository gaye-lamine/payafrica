[tool.poetry]
name = "payafrica-sdk"
version = "2.0.0"
description = "Unified West African mobile-money payment SDK."
authors = ["PayAfrica Contributors"]
packages = [{ include = "payafrica" }]

[tool.poetry.dependencies]
python = ">=3.10"
pydantic = ">=2.0.0"
httpx = ">=0.24.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0.0"
pytest-asyncio = ">=0.21.0"
respx = ">=0.20.0"
mypy = ">=1.0.0"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.10"
strict = true

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
