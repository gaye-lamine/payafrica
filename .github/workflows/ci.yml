name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm --workspace @payafrica/core-node test
      - run: npm --workspace @payafrica/core-node run typecheck
      - run: npm --workspace @payafrica/cli run build

  test-php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Install Composer dependencies
        working-directory: packages/core-php
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run PHPUnit contract tests
        working-directory: packages/core-php
        run: vendor/bin/phpunit

  test-python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Poetry
        run: pipx install poetry
      - name: Install Python dependencies
        working-directory: packages/core-python
        run: poetry install
      - name: Run Pytest contract tests
        working-directory: packages/core-python
        run: poetry run pytest
