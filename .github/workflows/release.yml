name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to create in the PHP mirror (defaults to mirror-test-<run number>)
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-npm:
    name: Publish npm packages
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm --workspace @waslpay/core-node run build
      - run: npm --workspace @waslpay/cli run build
      - name: Publish core Node package
        working-directory: packages/core-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish CLI package
        working-directory: packages/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish Python package
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pipx install poetry
      - name: Build Python distribution
        working-directory: packages/core-python
        run: poetry build
      - name: Publish to PyPI
        working-directory: packages/core-python
        run: poetry publish --username __token__ --password "$PYPI_TOKEN"
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  validate-composer:
    name: Validate Composer package
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Validate Composer package
        working-directory: packages/core-php
        run: composer validate --strict

  publish-php-mirror:
    name: Publish PHP mirror
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify mirror authentication is configured
        env:
          MIRROR_TOKEN: ${{ secrets.WASLPAY_PHP_MIRROR_TOKEN }}
        run: |
          if [ -z "$MIRROR_TOKEN" ]; then
            echo "::error title=Missing WASLPAY_PHP_MIRROR_TOKEN::Create the repository secret WASLPAY_PHP_MIRROR_TOKEN with Contents: Read and write access to gaye-lamine/waslpay-php."
            exit 1
          fi
      - name: Resolve mirror tag
        id: mirror-tag
        env:
          REQUESTED_TAG: ${{ inputs.tag_name }}
          SOURCE_TAG: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${REQUESTED_TAG:-mirror-test-${RUN_NUMBER}}"
          else
            tag_name="$SOURCE_TAG"
          fi
          git check-ref-format --allow-onelevel "refs/tags/${tag_name}"
          echo "name=${tag_name}" >> "$GITHUB_OUTPUT"
      - name: Split PHP package history
        run: git subtree split --prefix=packages/core-php -b php-mirror-branch
      - name: Push PHP package and matching tag to the mirror
        env:
          MIRROR_TOKEN: ${{ secrets.WASLPAY_PHP_MIRROR_TOKEN }}
          RELEASE_TAG: ${{ steps.mirror-tag.outputs.name }}
        run: |
          git remote add php-mirror "https://x-access-token:${MIRROR_TOKEN}@github.com/gaye-lamine/waslpay-php.git"
          git push php-mirror php-mirror-branch:main --force
          git tag --force "$RELEASE_TAG" php-mirror-branch
          git push php-mirror "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
