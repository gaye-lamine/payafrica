name: Deploy documentation

on:
  push:
    branches: [main]
    paths:
      - "packages/docs/**"
      - "COMPATIBILITY.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm --workspace @payafrica/docs run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/docs/build
      - id: deployment
        uses: actions/deploy-pages@v4
